<!DOCTYPE html>
<html>
<head>
    <title>Delete Expenses</title>
</head>
<body>
    <h1>Delete Expenses</h1>
    <table>
        <thead>
            <tr>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ expense.amount }}</td>
                <td>{{ expense.category }}</td>
                <td>{{ expense.date }}</td>
                <td>
                    <form method="POST">
                        {% csrf_token %}
                        <input type="hidden" name="expense_id" value="{{ expense.id }}">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4">No expenses found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
